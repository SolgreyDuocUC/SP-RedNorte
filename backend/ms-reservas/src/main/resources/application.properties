spring.application.name=ms-reservas
server.port=8003

# Importar variables de entorno desde el archivo .env
# (el prefijo "configparser:" no existe en Spring Boot; se usa "file:...[.properties]"
# para indicar a Spring que parsee el .env como un archivo de propiedades)
spring.config.import=optional:file:../../.env[.properties],optional:file:../.env[.properties],optional:file:.env[.properties]


# ===============================
# PERFIL ACTIVO
# ===============================
spring.profiles.active=dev

# ===============================
# ENCODING
# ===============================
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

# ===============================
# TIMEZONE
# ===============================
spring.jackson.time-zone=America/Santiago

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ===============================
# BASE DE DATOS - POSTGRESQL (NEON)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bd_rednorte}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgrespassword}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# ===============================
# POOL DE CONEXIONES (HIKARI) - Tuning para el pooler de Neon
# Evita que el pooler cierre conexiones inactivas de forma abrupta
# ===============================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.max-lifetime=270000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Estrategias de nombres (respeta @Column exacto)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl


# SWAGGER / OPENAPI
# http://localhost:8003/swagger-ui/index.html

# ===============================
# URL MICROSERVICIOS
# ===============================
services.paciente.url=${MS_PACIENTE_URI:http://localhost:8002}
services.notificaciones.url=${MS_NOTIFICACIONES_URI:http://localhost:8010}
app.security.notification-secret=${NOTIFICATION_SERVICE_SECRET}

# ===============================
# SEGURIDAD - JWT (HS256, secreto compartido)
# Los tokens los emite ms-usuarios (staff) o ms-paciente (pacientes); ambos
# firman con este mismo secreto. Debe coincidir con
# application.security.jwt.secret-key de esos dos servicios.
# ===============================
application.security.jwt.secret-key=${JWT_SECRET_KEY:63e00738b0fb4a40926cbbfbeee2c33ea30db4d7b02162e05d90b2c7699276df}

# ===============================
# FLYWAY (solo datos de poblado; el esquema lo crea Hibernate ddl-auto)
# Deshabilitado el autoconfigurado de Spring Boot porque este correría ANTES
# que Hibernate cree las tablas. FlywaySeedRunner lo dispara manualmente
# despues del arranque, ver cl.rednorte.ms_reservas.config.FlywaySeedRunner.
# ===============================
spring.flyway.enabled=false
app.db.auto-seed=${DB_AUTO_SEED:true}