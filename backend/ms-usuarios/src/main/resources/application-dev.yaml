spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:msusuarios;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  security:
    jwt:
      # En dev firmamos con un par RSA generado en memoria al arranque.
      # En prod este bloque se reemplaza por el issuer-uri/jwk-set-uri del IdP.
      dev-keypair-enabled: true

logging:
  level:
    "[cl.rednorte.ms_usuarios]": DEBUG
