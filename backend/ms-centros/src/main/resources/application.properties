spring.application.name=ms-centros
server.port=8006

# Importar variables de entorno desde el archivo .env
spring.config.import=optional:file:../../.env[.properties],optional:file:../.env[.properties],optional:file:.env[.properties]

# ===============================
# PERFIL ACTIVO
# ===============================
spring.profiles.active=dev

# ===============================
# ENCODING
# ===============================
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

# ===============================
# TIMEZONE
# ===============================
spring.jackson.time-zone=America/Santiago

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO

# ===============================
# INTEGRACION - BDSISPRO (SERVIDOR HAPI FHIR CENTRAL)
# ===============================
# IMPORTANTE: Este microservicio es un cliente FHIR. No debe apuntar a sí mismo (localhost:8006).
# Debe apuntar a la URL base de tu servidor FHIR (por ejemplo HAPI FHIR JPA Server).
# Para desarrollo/pruebas locales sin un servidor propio levantado, se puede usar el Sandbox público de HAPI:
# URL Pública Test: https://hapi.fhir.org/baseR4
# URL Local por defecto: http://localhost:8080/fhir (o la URL de tu contenedor HAPI FHIR)
integration.bdsispro.url=${FHIR_SERVER_URL:https://hapi.fhir.org/baseR4}

# SWAGGER / OPENAPI
# http://localhost:8006/swagger-ui/index.html

