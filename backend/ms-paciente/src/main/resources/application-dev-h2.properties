# Perfil dev con H2 en memoria (sin MySQL). Para smoke E2E local.
# Uso: SPRING_PROFILES_ACTIVE=dev-h2

# BD: H2 con compatibilidad MySQL (no rompe el esquema actual)
spring.datasource.url=jdbc:h2:mem:msp;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crea el esquema al arranque (solo H2 in-memory)
spring.jpa.hibernate.ddl-auto=update

# Consola H2 (autoconfigurada por Spring Boot al detectar H2 en el classpath)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CORS local (frontend dev)
app.cors.allowed-origins[0]=http://localhost:3000
app.cors.allowed-origins[1]=http://localhost:5173
