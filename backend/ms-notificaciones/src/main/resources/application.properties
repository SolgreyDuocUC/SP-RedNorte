# ==========================================
# CONFIGURACIÓN GENERAL DEL MICROSERVICIO
# ==========================================
spring.application.name=ms-notificaciones
server.port=8010

# Importar variables de entorno desde el archivo .env
spring.config.import=optional:file:../../../.env[.properties],optional:file:../../.env[.properties],optional:file:../.env[.properties],optional:file:.env[.properties]

# ==========================================
# CONFIGURACIÓN SMTP DE GMAIL
# ==========================================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

# PROPIEDADES DE SEGURIDAD Y PROTOCOLO TLS
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# TIMEOUTS PARA EVITAR BLOQUEOS EN EL RUNTIME
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# CONFIGURACIÓN DE SEGURIDAD E INTER-MS
app.security.notification-secret=${NOTIFICATION_SERVICE_SECRET}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# Actuator health no debe depender de que el SMTP este correctamente configurado
# (sin credenciales reales, el contenedor quedaria "unhealthy" y bloquearia el
# resto del stack en docker-compose por sus dependencias con condition: service_healthy).
management.health.mail.enabled=false