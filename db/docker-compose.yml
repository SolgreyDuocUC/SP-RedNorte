version: "3.8"

services:
  postgres-rednorte-dev:
    image: postgres:16-alpine
    container_name: rednorte-postgres-dev
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Santiago

    ports:
      # Expone el puerto 3307 de tu máquina hacia el 5432 del contenedor
      - "${DB_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - rednorte-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  rednorte-network:
    driver: bridge

volumes:
  postgres_data: