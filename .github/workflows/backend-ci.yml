name: Backend CI

on:
  push:
    branches: [ main, feature-* ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  # Compila todos los microservicios del backend (reactor multi-modulo)
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar todos los microservicios
        working-directory: backend
        run: mvn -B -ntp package -DskipTests

  # Ejecuta los tests de ms-notificaciones (no requieren base de datos)
  test-ms-notificaciones:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar tests
        working-directory: backend/ms-notificaciones
        run: mvn -B -ntp test
