version: "3.8"

services:

  # -----------------------------------------------------------
  # BASE DE DATOS (PostgreSQL)
  # -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: rednorte-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${POSTGRES_DB:-bd_rednorte}
      TZ: America/Santiago
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rednorte-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bd_rednorte}"]
      interval: 10s
      timeout: 5s
      retries: 5



  # -----------------------------------------------------------
  # MICROSERVICIO: ms-ficha-clinica
  # -----------------------------------------------------------
  ms-ficha-clinica:
    build:
      context: ./backend/ms-ficha-clinica
      dockerfile: Dockerfile

    image: rednorte/ms-ficha-clinica:dev
    container_name: rednorte-ms-ficha-clinica-dev
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy


    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/bd_rednorte}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgrespassword}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:-org.postgresql.Driver}
      TZ: America/Santiago

    ports:
      - "8001:8001"

    networks:
      - rednorte-network

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # -----------------------------------------------------------
  # MICROSERVICIO: ms-paciente
  # -----------------------------------------------------------
  ms-paciente:
    build:
      context: ./backend/ms-paciente
      dockerfile: Dockerfile

    image: rednorte/ms-paciente:dev
    container_name: rednorte-ms-paciente-dev
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy


    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/bd_rednorte}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgrespassword}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:-org.postgresql.Driver}
      TZ: America/Santiago

    ports:
      - "8002:8002"

    networks:
      - rednorte-network

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # -----------------------------------------------------------
  # MICROSERVICIO: ms-reservas
  # -----------------------------------------------------------
  ms-reservas:
    build:
      context: ./backend/ms-reservas
      dockerfile: Dockerfile

    image: rednorte/ms-reservas:dev
    container_name: rednorte-ms-reservas-dev
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      ms-notificaciones:
        condition: service_started


    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/bd_rednorte}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgrespassword}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:-org.postgresql.Driver}
      MS_NOTIFICACIONES_URI: http://ms-notificaciones:8010
      NOTIFICATION_SERVICE_SECRET: ${NOTIFICATION_SERVICE_SECRET}
      TZ: America/Santiago

    ports:
      - "8003:8003"

    networks:
      - rednorte-network

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # -----------------------------------------------------------
  # MICROSERVICIO: ms-notificaciones
  # -----------------------------------------------------------
  ms-notificaciones:
    build:
      context: ./backend/ms-notificaciones
      dockerfile: Dockerfile

    image: rednorte/ms-notificaciones:dev
    container_name: rednorte-ms-notificaciones-dev
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      NOTIFICATION_SERVICE_SECRET: ${NOTIFICATION_SERVICE_SECRET}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-*}
      TZ: America/Santiago

    ports:
      - "8010:8010"

    networks:
      - rednorte-network

  # -----------------------------------------------------------
  # MICROSERVICIO: ms-usuarios
  # -----------------------------------------------------------
  ms-usuarios:
    build:
      context: ./backend/ms-usuarios
      dockerfile: Dockerfile

    image: rednorte/ms-usuarios:dev
    container_name: rednorte-ms-usuarios-dev
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/bd_rednorte}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgrespassword}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:-org.postgresql.Driver}
      TZ: America/Santiago

    ports:
      - "8004:8004"

    networks:
      - rednorte-network

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8004/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # -----------------------------------------------------------
  # MICROSERVICIO: ms-urgencias
  # -----------------------------------------------------------
  ms-urgencias:
    build:
      context: ./backend/ms-urgencias
      dockerfile: Dockerfile

    image: rednorte/ms-urgencias:dev
    container_name: rednorte-ms-urgencias-dev
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/bd_rednorte}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgrespassword}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:-org.postgresql.Driver}
      TZ: America/Santiago

    ports:
      - "8005:8005"

    networks:
      - rednorte-network

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8005/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # -----------------------------------------------------------
  # MICROSERVICIO: ms-centros (Centros y Organizaciones FHIR)
  # -----------------------------------------------------------
  ms-centros:
    build:
      context: ./backend/ms-centros
      dockerfile: Dockerfile

    image: rednorte/ms-centros:dev
    container_name: rednorte-ms-centros-dev
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/bd_rednorte}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgrespassword}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:-org.postgresql.Driver}
      TZ: America/Santiago

    ports:
      - "8006:8006"

    networks:
      - rednorte-network

  # -----------------------------------------------------------
  # MICROSERVICIO: ms-gateway (API Gateway)
  # -----------------------------------------------------------
  ms-gateway:
    build:
      context: ./backend/ms-gateway
      dockerfile: Dockerfile

    image: rednorte/ms-gateway:dev
    container_name: rednorte-ms-gateway-dev
    restart: unless-stopped

    depends_on:
      - ms-ficha-clinica
      - ms-paciente
      - ms-reservas
      - ms-usuarios
      - ms-urgencias
      - ms-centros

    environment:
      SPRING_PROFILES_ACTIVE: dev
      MS_FICHA_CLINICA_URI: http://ms-ficha-clinica:8001
      MS_PACIENTE_URI: http://ms-paciente:8002
      MS_RESERVAS_URI: http://ms-reservas:8003
      MS_USUARIOS_URI: http://ms-usuarios:8004
      MS_URGENCIAS_URI: http://ms-urgencias:8005
      MS_CENTROS_URI: http://ms-centros:8006
      TZ: America/Santiago

    ports:
      - "8011:8011"

    networks:
      - rednorte-network

  # -----------------------------------------------------------
  # FRONTEND
  # -----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    image: rednorte/frontend:dev
    container_name: rednorte-frontend-dev
    restart: unless-stopped

    depends_on:
      - ms-gateway
      - ms-reservas
      - ms-paciente

    environment:
      TZ: America/Santiago

    ports:
      - "${FRONTEND_PORT}:80"

    networks:
      - rednorte-network

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# =============================================================
# REDES
# =============================================================
networks:
  rednorte-network:
    name: db_rednorte-network
    driver: bridge

# =============================================================
# VOLÚMENES
# =============================================================
volumes:
  postgres_data:

