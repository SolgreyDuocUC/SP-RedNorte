server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------
    # REVERSE PROXY → ms-reservas (evita CORS)
    # -------------------------------------------------------
    location /proxy/reservas/ {
        proxy_pass http://ms-reservas:8003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------
    # REVERSE PROXY → ms-paciente (evita CORS)
    # -------------------------------------------------------
    location /proxy/pacientes/ {
        proxy_pass http://ms-paciente:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------
    # REVERSE PROXY → ms-centros (evita CORS)
    # -------------------------------------------------------
    location /proxy/centros/ {
        proxy_pass http://ms-centros:8006/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------
    # REVERSE PROXY → ms-ficha-clinica (evita CORS)
    # -------------------------------------------------------
    location /proxy/ficha-clinica/ {
        proxy_pass http://ms-ficha-clinica:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------
    # REVERSE PROXY → ms-urgencias (evita CORS)
    # -------------------------------------------------------
    location /proxy/urgencias/ {
        proxy_pass http://ms-urgencias:8005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------
    # REVERSE PROXY → ms-notificaciones (evita CORS)
    # -------------------------------------------------------
    location /proxy/notificaciones/ {
        proxy_pass http://ms-notificaciones:8010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------
    # REVERSE PROXY → ms-usuarios (evita CORS)
    # -------------------------------------------------------
    location /proxy/usuarios/ {
        proxy_pass http://ms-usuarios:8004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }


    # -------------------------------------------------------
    # Soporte para React Router (SPA)
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos generados por Vite (hash en nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cachear el HTML principal
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}

