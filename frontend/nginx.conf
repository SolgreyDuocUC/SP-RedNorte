server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Tamaño máximo para cargas (archivos médicos, imágenes, etc.)
    client_max_body_size 20M;

    # Resolver interno de Docker para evitar caídas de Nginx si un microservicio reinicia
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Resiliencia y timeouts en proxy
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # -------------------------------------------------------
    # REVERSE PROXY → API Gateway Central (ms-gateway:8011)
    # -------------------------------------------------------
    location /api/ {
        set $upstream_gateway http://ms-gateway:8011;
        proxy_pass $upstream_gateway/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------
    # REVERSE PROXY DIRECTOS → Microservicios (evita CORS)
    # -------------------------------------------------------
    location /proxy/reservas/ {
        set $upstream_reservas http://ms-reservas:8003;
        proxy_pass $upstream_reservas/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /proxy/pacientes/ {
        set $upstream_paciente http://ms-paciente:8002;
        proxy_pass $upstream_paciente/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /proxy/centros/ {
        set $upstream_centros http://ms-centros:8006;
        proxy_pass $upstream_centros/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /proxy/ficha-clinica/ {
        set $upstream_ficha http://ms-ficha-clinica:8001;
        proxy_pass $upstream_ficha/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /proxy/urgencias/ {
        set $upstream_urgencias http://ms-urgencias:8005;
        proxy_pass $upstream_urgencias/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /proxy/notificaciones/ {
        set $upstream_notificaciones http://ms-notificaciones:8010;
        proxy_pass $upstream_notificaciones/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /proxy/usuarios/ {
        set $upstream_usuarios http://ms-usuarios:8004;
        proxy_pass $upstream_usuarios/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------
    # Soporte para React Router (SPA)
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos generados por Vite (hash en nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cachear el HTML principal
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}


